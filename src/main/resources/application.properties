spring.application.name=stacks

# Server Configuration
# Use PORT environment variable if available (for cloud platforms like Koyeb), otherwise default to 8080
# Note: If PORT is set to 80, ensure the container has proper permissions or use port mapping
server.port=${PORT:8080}

# Database Configuration (Supabase PostgreSQL)
# Using Session Mode (Direct Connection port 5432) - more stable, supports all PostgreSQL features
# Session mode gives direct database access without pooler restrictions
spring.datasource.url=jdbc:postgresql://aws-1-eu-north-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=${DB_USERNAME:postgres.uunqvkcyutcxpqbcgrvw}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
# HikariCP Connection Pool Configuration
# ULTRA CONSERVATIVE: Using only 1 connection to prevent Supabase connection limit issues
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000
# Connection validation and recovery settings
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.initialization-fail-timeout=1

# JPA Configuration
# Using 'update' to automatically create missing tables (change back to 'validate' after first run)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Transaction and connection handling
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Disable prepared statement caching for metadata queries to avoid pooler conflicts
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
# Handle transaction errors gracefully
spring.transaction.default-timeout=60

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long-for-security}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Google OAuth Configuration
google.client-id=${GOOGLE_CLIENT_ID:642093360964-e9qcaqeiickgb0fvkv324ojst0s4tf42.apps.googleusercontent.com}

# LinkedIn OAuth Configuration
linkedin.client-id=${LINKEDIN_CLIENT_ID:}
linkedin.client-secret=${LINKEDIN_CLIENT_SECRET:}
linkedin.redirect-uri=${LINKEDIN_REDIRECT_URI:http://localhost:5173/auth/linkedin/callback}

# Email Configuration (Brevo SMTP)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=9baed5001@smtp-brevo.com
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email Sender Configuration
spring.mail.from=stakeholders921@gmail.com
spring.mail.from.name=${MAIL_FROM_NAME:StackSupport}

# App URL for email links
app.url=${APP_URL:https://stakesomosholdrs.com}

# CORS Configuration (if needed)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Stripe Configuration
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.success-url=${STRIPE_SUCCESS_URL:${app.url}/settings?payment=success&session_id={CHECKOUT_SESSION_ID}}
stripe.cancel-url=${STRIPE_CANCEL_URL:${app.url}/settings?payment=cancelled}

# Stripe Price IDs - Create these in Stripe Dashboard (Products > Add product)
# Replace with your actual price IDs from https://dashboard.stripe.com/test/products
stripe.price.weekly=${STRIPE_PRICE_WEEKLY:price_REPLACE_WITH_YOUR_WEEKLY_PRICE_ID}
stripe.price.monthly=${STRIPE_PRICE_MONTHLY:price_REPLACE_WITH_YOUR_MONTHLY_PRICE_ID}
stripe.price.annual=${STRIPE_PRICE_ANNUAL:price_REPLACE_WITH_YOUR_ANNUAL_PRICE_ID}
